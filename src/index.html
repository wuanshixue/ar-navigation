<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>A-Frame: AR Navigation MVP</title>
  <meta itemprop="name" content="A-Frame: AR Navigation MVP">
  <meta name="twitter:title" content="A-Frame: AR Navigation MVP">
  <meta property="og:title" content="A-Frame: AR Navigation MVP">
  <meta property="og:site_name" content="A-Frame: AR Navigation MVP">
  <meta name="description" content="Tap the ground to place route points, then start AR navigation with distance updates and waypoint progression.">
  <meta itemprop="description" content="Tap the ground to place route points, then start AR navigation with distance updates and waypoint progression.">
  <meta property="og:description" content="Tap the ground to place route points, then start AR navigation with distance updates and waypoint progression.">
  <meta name="twitter:description" content="Tap the ground to place route points, then start AR navigation with distance updates and waypoint progression.">
  <script crossorigin="anonymous" src="./external/scripts/8frame-1.5.0.min.js"></script>
  <script crossorigin="anonymous" src="./external/xrextras/xrextras.js"></script>
  <script crossorigin="anonymous" src="./external/landing-page/landing-page.js"></script>
  <script crossorigin="anonymous" src="./external/xr/xr.js" async="true" data-preload-chunks="slam">
  </script>

<!-- Copyright (c) 2024 8th Wall, Inc. -->
<!-- head.html is optional; elements will be added to your html head before app.js is loaded. -->

<!-- Use "8thwall:" meta tags to hook into 8th Wall's build process and developer tools. -->
<meta name="8thwall:renderer" content="aframe:1.5.0"/>
<meta name="8thwall:package" content="@8thwall.xrextras"/>
<meta name="8thwall:package" content="@8thwall.landing-page"/>


</head>

<body>
<script src="bundle.js"></script>
<!-- Copyright (c) 2022 8th Wall, Inc. -->
<!-- body.html is optional; elements will be added to your html body after app.js is loaded. -->

<div class="over">
  <span id="promptText">点击地面设置起点和终点</span>
  <div class="anchor-picker">
    <label for="startAnchorSelect">室内起点</label>
    <select id="startAnchorSelect">
      <option value="">请选择起点锚点</option>
    </select>
    <button id="applyStartAnchorBtn">应用起点</button>
    <select id="destinationSelect">
      <option value="">请选择目的地</option>
    </select>
    <label for="destinationSelect">目的地</label>
  </div>
  <div id="debugPanel" class="debug-panel">
    <div class="debug-panel__header">
      <span class="debug-panel__title">Debug</span>
      <button id="toggleDebugPanelBtn" type="button">折叠</button>
    </div>
    <div id="debugPanelBody" class="debug-panel__body">
      <div id="debugModeText">Mode: -</div>
      <div id="debugStartAnchorText">StartAnchor: -</div>
      <div id="debugTriggerText">Trigger: -</div>
      <div id="debugArmedText">Armed: -</div>
      <div id="debugRouteText">Route: -</div>
      <div id="debugGpsText">GPS: -</div>
      <div id="debugCalibrationText">Calibration: -</div>
      <div id="debugDiagText">Diag: -</div>
    </div>
  </div>
  <div class="controls">
    <button id="calibrateBtn">校准定位</button>
    <button id="clearCalibrationBtn">清除校准</button>
    <button id="resetTriggerBtn">重置触发</button>
    <button id="startNavBtn">开始导航</button>
    <button id="undoPointBtn">撤销上一个点</button>
    <button id="clearRouteBtn">清空路线</button>
    <button id="recenterBtn">重定位</button>
  </div>
  <div id="statusText">等待设置路线</div>
</div>

<!-- Add the tap-place component to the scene so it has an effect -->
<a-scene
  tap-place
  landing-page
  xrextras-loading
  xrextras-runtime-error
  renderer="colorManagement:true"
  xrweb="
    allowedDevices: any;
    defaultEnvironmentFogIntensity: 0.5; 
    defaultEnvironmentFloorTexture: #groundTex; 
    defaultEnvironmentFloorColor: #FFF;
    defaultEnvironmentSkyBottomColor: #B4C4CC; 
    defaultEnvironmentSkyTopColor: #5ac8fa;
    defaultEnvironmentSkyGradientStrength: 0.5;">

  <!-- We can define assets here to be loaded when A-Frame initializes -->
  <a-assets>
    <img id="groundTex" src="assets/sand.jpg">
  </a-assets>

  <!-- The raycaster will emit mouse events on scene objects specified with the cantap class -->
  <a-camera
    id="camera"
    position="0 8 8"
    raycaster="objects: .cantap"
    cursor="
      fuse: false;
      rayOrigin: mouse;">
  </a-camera>

  <a-entity
    light="
      type: directional;
      intensity: 0.8;
      castShadow: true;
      shadowMapHeight:2048;
      shadowMapWidth:2048;
      shadowCameraTop: 40;
      shadowCameraBottom: -40;
      shadowCameraRight: 40;
      shadowCameraLeft: -40;
      target: #camera"
    xrextras-attach="target: camera; offset: 8 15 4"
    position="1 4.3 2.5"
    shadow>
  </a-entity>

  <a-light type="ambient" intensity="0.5"></a-light>

  <!-- Adding the cantap class allows the ground to be clicked -->
  <a-box
    id="ground"
    class="cantap"
    scale="1000 2 1000"
    position="0 -0.99 0"
    material="shader: shadow; transparent: true; opacity: 0.4"
    shadow>
  </a-box>
</a-scene>

</body>

</html>
